<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar Contraseña | Fysium</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background-color: #f5f6fa;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 400px;
      /* Tamaño perfecto para móvil y PC */
      text-align: center;
    }

    h1 {
      color: #2D5D5D;
      margin-bottom: 15px;
      font-size: 24px;
    }

    p {
      color: #555;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 16px;
      margin: 15px 0;
      border-radius: 12px;
      text-decoration: none;
      font-weight: bold;
      border: none;
      cursor: pointer;
      font-size: 16px;
    }

    .btn-app {
      background-color: #2D5D5D;
      color: white;
    }

    .btn-pc {
      background-color: #F39985;
      color: white;
    }

    #pcSection {
      display: none;
    }

    /* Oculto por defecto */
  </style>
</head>

<body>
  <div class="card">
    <h1>¡Casi listo!</h1>
    <p>Has solicitado cambiar tu contraseña.</p>

    <a href="fysiumapp://reset-password" id="mobileLink" class="btn btn-app">Abrir en la App Fysium</a>

    <div id="pcSection">
      <p>¿Estás en el PC?</p>
      <a href="mailto:soporte@fysium.com?subject=Ayuda%20Reset%20Contrase%C3%B1a" class="btn btn-pc">Contactar con Soporte</a>
    </div>
  </div>

  <script>
    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

    if (isMobile) {
      // En móvil mostramos el botón de abrir la app
      document.getElementById('mobileLink').style.display = 'block';
    } else {
      // En PC ocultamos el botón de la app y mostramos el de soporte
      document.getElementById('mobileLink').style.display = 'none';
      document.getElementById('pcSection').style.display = 'block';
    }
  </script>
</body>

</html>
