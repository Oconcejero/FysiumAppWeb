<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar Contraseña | Fysium</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background-color: #f5f6fa;
      text-align: center;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      max-width: 400px;
      width: 100%;
    }

    h1 {
      color: #2D5D5D;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 15px;
      margin: 10px 0;
      border-radius: 12px;
      text-decoration: none;
      font-weight: bold;
      border: none;
      cursor: pointer;
    }

    .btn-app {
      background-color: #2D5D5D;
      color: white;
    }

    .btn-pc {
      background-color: #F39985;
      color: white;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>¡Casi listo!</h1>
    <p>Has solicitado cambiar tu contraseña.</p>

    <a href="#" id="mobileLink" class="btn btn-app">Abrir en la App Fysium</a>

    <div id="pcSection">
      <p>¿Estás en el PC?</p>
      <a href="mailto:soporte@fysium.com?subject=Ayuda%20Reset%20Contrase%C3%B1a" class="btn btn-pc">Contactar con Soporte</a>
    </div>
  </div>

  <script>
    // 1. Detectar si es móvil
    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
    const hash = window.location.hash; // Aquí viene el token de Supabase

    if (isMobile) {
      // Redirigir al esquema de la app con el token
      document.getElementById('mobileLink').href = "fysiumapp://reset-password" + hash;
      // Intentar abrir automáticamente
      window.location.href = "fysiumapp://reset-password" + hash;
    } else {
      document.getElementById('mobileLink').style.display = 'none';
    }
  </script>
</body>

</html>
